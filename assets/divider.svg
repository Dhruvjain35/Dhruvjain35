<svg xmlns="http://www.w3.org/2000/svg" width="900" height="8" viewBox="0 0 900 8" fill="none" role="img">
  <rect y="3.5" width="900" height="1" fill="#21262d"/>
  <rect y="2.5" width="170" height="3" rx="1.5" fill="url(#sweep)">
    <animate attributeName="x" values="-170;900" dur="3.6s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.45 0 0.2 1"/>
  </rect>
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
